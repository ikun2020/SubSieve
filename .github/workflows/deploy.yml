name: Build Docker Images

'on':
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_BASENAME: subsieve

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        shell: bash
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "$GHCR_TOKEN" | docker login "$REGISTRY" -u "$GITHUB_ACTOR" --password-stdin

      - name: Build and push images
        shell: bash
        run: |
          set -euo pipefail

          owner="$(printf '%s' "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')"
          short_sha="${GITHUB_SHA::7}"
          gateway_image="${REGISTRY}/${owner}/${IMAGE_BASENAME}-gateway"
          admin_image="${REGISTRY}/${owner}/${IMAGE_BASENAME}-admin"

          docker build \
            -t "${gateway_image}:latest" \
            -t "${gateway_image}:sha-${short_sha}" \
            sgw/gateway

          docker build \
            -t "${admin_image}:latest" \
            -t "${admin_image}:sha-${short_sha}" \
            sgw/admin

          docker push "${gateway_image}:latest"
          docker push "${gateway_image}:sha-${short_sha}"
          docker push "${admin_image}:latest"
          docker push "${admin_image}:sha-${short_sha}"

          {
            echo "### Published Docker images"
            echo
            echo "- \`${gateway_image}:latest\`"
            echo "- \`${gateway_image}:sha-${short_sha}\`"
            echo "- \`${admin_image}:latest\`"
            echo "- \`${admin_image}:sha-${short_sha}\`"
          } >> "$GITHUB_STEP_SUMMARY"
