services:
  gateway:
    image: ${GATEWAY_IMAGE:-ghcr.io/ikun2020/subsieve-gateway:latest}
    build: ./gateway
    container_name: subscribe-gateway
    restart: unless-stopped
    ports:
      - "${GATEWAY_BIND:-127.0.0.1}:${GATEWAY_PORT:-3333}:80"
    environment:
      - V2B_BACKEND=${V2B_BACKEND}
      - V2B_HOST=${V2B_HOST}
      - SUBSCRIBE_PATH=${SUBSCRIBE_PATH:-/s}
    volumes:
      - gw_config:/etc/nginx/subscribe
      - gw_logs:/var/log/subscribe

  admin:
    image: ${ADMIN_IMAGE:-ghcr.io/ikun2020/subsieve-admin:latest}
    build: ./admin
    container_name: subscribe-admin
    restart: unless-stopped
    ports:
      - "${ADMIN_BIND:-127.0.0.1}:${ADMIN_PORT:-3334}:64444"
    environment:
      - ADMIN_USER=${ADMIN_USER:-admin}
      - ADMIN_PASS=${ADMIN_PASS}
      - ADMIN_SECRET_PATH=${ADMIN_SECRET_PATH}
      - GATEWAY_PORT=${GATEWAY_PORT:-3333}
    volumes:
      - gw_config:/etc/nginx/subscribe
      - gw_logs:/var/log/subscribe

volumes:
  gw_config:
  gw_logs:
