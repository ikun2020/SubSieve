user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr [$time_local] "$host" "$request" '
                      '$status $body_bytes_sent "$http_user_agent"';

    access_log  /var/log/subscribe/access.log  main;
    error_log   /var/log/subscribe/error.log   warn;

    sendfile on;
    keepalive_timeout 65;
    server_tokens off;

    # Restore the real client IP from the host reverse proxy before logging,
    # geo rules, blacklist checks, and rate limiting run.
    set_real_ip_from 127.0.0.1;
    set_real_ip_from ::1;
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    set_real_ip_from fc00::/7;
    set_real_ip_from fe80::/10;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    resolver 1.1.1.1 valid=60s ipv6=off;
    resolver_timeout 5s;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    include /etc/nginx/subscribe/cloud_geo.conf;
    include /etc/nginx/subscribe/whitelist.conf;
    include /etc/nginx/subscribe/ua_custom.conf;
    include /etc/nginx/subscribe/ua_whitelist.conf;

    server {
        listen 80 default_server;

        include /etc/nginx/subscribe/blacklist.conf;
        include /etc/nginx/subscribe/protect.conf;

        location / { return 404; }
    }
}

